<!DOCTYPE html>
<!--
  App Store / social marketing tile template for Hounsfield.
  Served from public/ so same-origin iframe scripting works.

  Params:
    headline   top caption line — split on ' — ' for accent colour
    sub        smaller caption line below
    bg         'light' | 'dark'
    tab        'studies' | 'study' | 'settings' | 'capture'
    theme      'light' | 'dark' — in-app theme (defaults to bg value)
    scroll     0.0–1.0 fraction of .app-main scrollHeight
    ready      '1' — cosmetically patch model chip to "MedGemma · mlx"
-->
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { width: 100vw; height: 100vh; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    position: relative;
  }
  body.bg-light { background: linear-gradient(170deg,#faf9f5 0%,#ede3d2 100%); }
  body.bg-dark  { background: linear-gradient(170deg,#222120 0%,#181716 100%); }

  /* ── phone region: top 76% ── */
  .phone-region {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 24%;
    display: flex; align-items: center; justify-content: center;
  }

  .frame {
    /* height = 70% of viewport; width auto-constrained by 393:852 ratio */
    height: 70%;
    aspect-ratio: 393 / 852;
    border-radius: 5.5vw; overflow: hidden; background: #000;
    position: relative;
    box-shadow:
      0 0 0 1.1vw #1c1c1c,
      0 0 0 1.35vw #404040,
      0 5vh 14vh -3vh rgba(0,0,0,0.5);
  }
  .frame iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Dynamic island */
  .notch {
    position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
    display: flex; justify-content: center; pointer-events: none;
  }
  .notch::after {
    content: '';
    width: 30%; height: 3.8%;
    background: #111; border-radius: 0 0 40% 40%;
  }

  /* ── caption strip: bottom 24% ── */
  .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0; height: 24%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 9%;
  }
  .caption::before {
    content: '';
    position: absolute; top: 0; left: 9%; right: 9%; height: 1px;
    background: rgba(128,118,108,0.18);
  }

  .cap-headline {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(16px, 3.4vw, 56px);
    font-weight: 700; line-height: 1.22; letter-spacing: -0.01em;
  }
  .accent { color: #d97757; }
  .bg-light .cap-headline { color: #1a1917; }
  .bg-dark  .cap-headline { color: #f0ece4; }

  .cap-sub {
    margin-top: 1.5%;
    font-size: clamp(12px, 2.1vw, 32px);
    line-height: 1.45;
  }
  .bg-light .cap-sub { color: #706b60; }
  .bg-dark  .cap-sub { color: #b0ab9e; }
</style>
</head>
<body>
  <div class="phone-region">
    <div class="frame">
      <div class="notch"></div>
      <iframe id="phone"></iframe>
    </div>
  </div>

  <div class="caption">
    <div class="cap-headline" id="headline"></div>
    <div class="cap-sub"      id="sub"></div>
  </div>

  <script>
    const p      = new URLSearchParams(location.search);
    const bg     = p.get('bg') === 'dark' ? 'dark' : 'light';
    const tab    = p.get('tab')    || 'studies';
    const theme  = p.get('theme') || bg;
    const scroll = parseFloat(p.get('scroll') || '0');
    const ready  = p.get('ready') === '1';

    document.body.className = 'bg-' + bg;

    // headline: 'Foo Bar — Accent part' → split at ' — '
    const raw    = p.get('headline') || 'Hounsfield';
    const dash   = raw.indexOf(' — ');
    const hlEl   = document.getElementById('headline');
    if (dash !== -1) {
      hlEl.innerHTML = raw.slice(0, dash) +
        ' <span class="accent">— ' + raw.slice(dash + 3) + '</span>';
    } else {
      hlEl.textContent = raw;
    }
    document.getElementById('sub').textContent = p.get('sub') || '';

    const iframe = document.getElementById('phone');
    iframe.src   = location.origin + '/';

    iframe.addEventListener('load', async () => {
      try {
        const doc = iframe.contentDocument;

        // Wait for app shell
        for (let i = 0; i < 40 && !doc.querySelector('.tabbar'); i++) {
          await new Promise(r => setTimeout(r, 120));
        }

        // Apply in-app theme via the segmented control
        if (theme === 'dark') {
          const segs = [...doc.querySelectorAll('.seg button')];
          const darkBtn = segs.find(b => b.textContent.trim() === 'Dark');
          if (darkBtn) darkBtn.click();
          await new Promise(r => setTimeout(r, 150));
        }

        // Navigate to the right screen
        if (tab === 'settings') {
          [...doc.querySelectorAll('button')].find(b => b.textContent.includes('SETTINGS'))?.click();
        } else if (tab === 'capture') {
          [...doc.querySelectorAll('button')].find(b => b.textContent.includes('NEW STUDY'))?.click();
        } else if (tab === 'study') {
          for (let i = 0; i < 20 && !doc.querySelector('.study-row'); i++) {
            await new Promise(r => setTimeout(r, 120));
          }
          doc.querySelector('.study-row')?.click();
        }

        await new Promise(r => setTimeout(r, 400));

        // Scroll the app's scrollable area
        if (scroll > 0) {
          const main = doc.querySelector('.app-main');
          if (main) {
            main.scrollTop = main.scrollHeight * scroll;
            await new Promise(r => setTimeout(r, 120));
          }
        }

        // Patch model chip cosmetically
        if (ready) {
          const chip = doc.querySelector('.model-chip');
          if (chip) chip.innerHTML = '<span class="dot ready"></span>MedGemma · mlx';
        }

        document.title = 'tile-ready';
      } catch (err) {
        console.warn('iframe drive failed:', err);
        document.title = 'tile-ready';
      }
    });
  </script>
</body>
</html>
